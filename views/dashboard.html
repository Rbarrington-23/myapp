<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.sidebar{
height:100vh;
background:#1f2937;
color:white;
padding:20px;
}

.sidebar h3{
color:white;
}

.sidebar a{
display:block;
color:#ddd;
text-decoration:none;
margin:15px 0;
}

.sidebar a:hover{
color:white;
}

.main{
padding:40px;
}

.note-card{
margin-bottom:15px;
}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- Sidebar -->

<div class="col-md-2 sidebar">

<h3>MyApp</h3>

<hr>

<a href="#">Dashboard</a>
<a href="/logout">Logout</a>

</div>

<!-- Main -->

<div class="col-md-10 main">

<h2>Your Notes</h2>

<div class="card p-3">

<form id="noteForm">

<input
type="text"
name="note"
id="noteInput"
class="form-control"
placeholder="Write a note..."
required>

<br>

<button class="btn btn-primary">
Save Note
</button>

</form>

</div>

<br>

<div id="notesContainer"></div>

</div>

</div>

</div>

<script>

/* LOAD NOTES */

function loadNotes(){

fetch("/notes")
.then(res => res.json())
.then(data => {

const container = document.getElementById("notesContainer")

container.innerHTML=""

data.forEach(note => {

container.innerHTML += `
<div class="card note-card p-3">

<div class="d-flex justify-content-between">

<span>${note.content}</span>

<button
class="btn btn-danger btn-sm"
onclick="deleteNote(${note.id})">
Delete
</button>

</div>

</div>
`

})

})

}

/* ADD NOTE WITHOUT PAGE RELOAD */

document.getElementById("noteForm").addEventListener("submit", function(e){

e.preventDefault()

const note = document.getElementById("noteInput").value

fetch("/add-note",{

method:"POST",

headers:{
"Content-Type":"application/x-www-form-urlencoded"
},

body:`note=${note}`

}).then(()=>{

document.getElementById("noteInput").value=""

loadNotes()

})

})

/* DELETE NOTE */

function deleteNote(id){

fetch("/delete-note",{

method:"POST",

headers:{
"Content-Type":"application/x-www-form-urlencoded"
},

body:`id=${id}`

}).then(()=>{

loadNotes()

})

}

/* LOAD NOTES WHEN PAGE OPENS */

loadNotes()

</script>

</body>
</html>
