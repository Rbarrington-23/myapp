<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>My App | Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#4e73df,#224abe);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial;
}

.card{
width:420px;
border:none;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.card-header{
background:white;
border-bottom:none;
text-align:center;
font-weight:bold;
font-size:22px;
}

.form-control{
margin-bottom:15px;
}

.btn-primary{
width:100%;
}

</style>

</head>

<body>

<div class="card">

<div class="card-header">
My App
</div>

<div class="card-body">

<h5 class="text-center mb-3">Create Account</h5>

<form action="/register" method="POST">

<input 
type="text" 
name="username" 
class="form-control"
placeholder="Username"
required>

<input 
type="password" 
name="password"
class="form-control"
placeholder="Password"
required>

<button class="btn btn-success">
Register
</button>

</form>

<hr>

<h5 class="text-center mb-3">Login</h5>

<form action="/login" method="POST">

<input 
type="text"
name="username"
class="form-control"
placeholder="Username"
required>

<input 
type="password"
name="password"
class="form-control"
placeholder="Password"
required>

<button class="btn btn-primary">
Login
</button>

</form>

</div>

</div>

</body>
</html>
<h1> My Notes </App</h1>
